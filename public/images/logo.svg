<svg width="400" height="150" viewBox="0 0 400 150" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Bodoni+Moda:ital,opsz,wght@0,6..96,400;1,6..96,400&amp;display=swap');
      @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400&amp;display=swap');
      
      .logo-r { 
        font-family: 'Bodoni Moda', serif; 
        font-size: 110px; 
        fill: #1A365D; 
      }
      .logo-c { 
        font-family: 'Bodoni Moda', serif; 
        font-size: 110px; 
        fill: #1A365D; 
      }
      .logo-text { 
        font-family: 'Montserrat', sans-serif; 
        font-size: 15px; 
        font-weight: 300;
        letter-spacing: 12px; 
        fill: #1A365D; 
      }
    </style>
  </defs>
  
  <g transform="translate(110, 100)">
    <!-- Overlapping R and C for the monogram -->
    <text x="50" y="0" class="logo-c" text-anchor="middle">C</text>
    <text x="-10" y="0" class="logo-r" text-anchor="middle">R</text>
  </g>
  
  <text x="206" y="135" class="logo-text" text-anchor="middle">REGENERATION CLINIC</text>
</svg>
